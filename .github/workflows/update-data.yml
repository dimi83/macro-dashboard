name: Update financial data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os

          FRED_KEY  = os.environ["FRED_API_KEY"]
          FMP_KEY   = os.environ["FMP_API_KEY"]
          FRED_BASE = "https://api.stlouisfed.org/fred/series/observations"
          FMP_BASE  = "https://financialmodelingprep.com/api/v3"

          def fred(series, start="2000-01-01"):
              url = f"{FRED_BASE}?series_id={series}&api_key={FRED_KEY}&file_type=json&sort_order=asc&observation_start={start}"
              print(f"Fetching FRED {series}...")
              with urllib.request.urlopen(url, timeout=30) as r:
                  payload = json.loads(r.read())
              result = [[o["date"][:7], float(o["value"])]
                        for o in payload["observations"] if o["value"] != "."]
              print(f"  {len(result)} rows")
              return result

          def fmp_get(path):
              url = f"{FMP_BASE}/{path}&apikey={FMP_KEY}"
              print(f"  FMP: {path[:60]}...")
              with urllib.request.urlopen(url, timeout=60) as r:
                  return json.loads(r.read())

          # ── Macro ────────────────────────────────────────────────
          vix = fred("VIXCLS", "2005-01-01")
          yc  = fred("T10Y2Y", "2000-01-01")
          with open("data.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "vix": vix, "yc": yc}, f, separators=(",",":"))
          print("data.json written!")

          # ── Stocks ───────────────────────────────────────────────
          print("Fetching S&P 500 constituents...")
          sp500   = fmp_get("sp500_constituent?")
          symbols = [s["symbol"] for s in sp500]
          sym_str = ",".join(symbols)
          print(f"  {len(symbols)} symbols")

          print("Fetching quotes...")
          quotes  = fmp_get(f"quote/{sym_str}?")

          print("Fetching profiles...")
          profiles = fmp_get(f"profile/{sym_str}?")
          pmap = {p["symbol"]: p for p in profiles}

          # SMA data comes from the quote endpoint fields
          # ATH we approximate from 52-week high (FMP quote has it)
          stocks = []
          for q in quotes:
              sym  = q.get("symbol","")
              p    = pmap.get(sym, {})
              pr   = float(q.get("price") or 0)
              sma50  = float(q.get("priceAvg50")  or 0)
              sma200 = float(q.get("priceAvg200") or 0)
              ath    = float(q.get("yearHigh") or 0)   # 52-week high as proxy
              stocks.append({
                  "s":    sym,
                  "n":    (q.get("name") or "")[:40],
                  "pr":   round(pr, 2),
                  "ch":   round(float(q.get("changesPercentage") or 0), 2),
                  "vo":   int(q.get("volume") or 0),
                  "mc":   int(q.get("marketCap") or 0),
                  "pe":   round(float(q.get("pe") or 0), 2),
                  "se":   p.get("sector",""),
                  "in":   p.get("industry",""),
                  "s50":  round(sma50, 2),
                  "s200": round(sma200, 2),
                  "ath":  round(ath, 2),
                  # % from SMA50: (price/sma50 - 1) * 100
                  "ps50":  round((pr/sma50  - 1)*100, 2) if sma50  > 0 else 0,
                  "ps200": round((pr/sma200 - 1)*100, 2) if sma200 > 0 else 0,
                  # % from 52w high
                  "path":  round((pr/ath - 1)*100, 2) if ath > 0 else 0,
              })

          stocks.sort(key=lambda x: x["mc"], reverse=True)

          with open("stocks.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "stocks": stocks}, f, separators=(",",":"))
          print(f"stocks.json written — {len(stocks)} stocks!")
          PYEOF

      - name: Commit files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json stocks.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update data $(date -u +%Y-%m-%d)" && git push)
