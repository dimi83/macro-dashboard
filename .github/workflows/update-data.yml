name: Update financial data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install yfinance pandas requests lxml html5lib --break-system-packages

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os
          import yfinance as yf
          import pandas as pd

          FRED_KEY  = os.environ["FRED_API_KEY"]
          FRED_BASE = "https://api.stlouisfed.org/fred/series/observations"

          def fred(series, start="2000-01-01"):
              url = f"{FRED_BASE}?series_id={series}&api_key={FRED_KEY}&file_type=json&sort_order=asc&observation_start={start}"
              print(f"Fetching FRED {series}...")
              with urllib.request.urlopen(url, timeout=30) as r:
                  payload = json.loads(r.read())
              result = [[o["date"][:7], float(o["value"])]
                        for o in payload["observations"] if o["value"] != "."]
              print(f"  {len(result)} rows")
              return result

          # ── Macro ─────────────────────────────────────────────────
          vix = fred("VIXCLS", "2005-01-01")
          yc  = fred("T10Y2Y", "2000-01-01")
          with open("data.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "vix": vix, "yc": yc}, f, separators=(",",":"))
          print("data.json written!")

          # ── S&P 500 list with sector/industry from Wikipedia ──────
          print("Getting S&P 500 list from Wikipedia...")
          tables = pd.read_html(
              "https://en.wikipedia.org/wiki/List_of_S%26P_500_companies",
              header=0
          )
          sp_table = tables[0]
          print(f"  Columns: {list(sp_table.columns)}")

          meta = {}
          for _, row in sp_table.iterrows():
              sym = str(row["Symbol"]).replace(".", "-").strip()
              meta[sym] = {
                  "name":     str(row["Security"]).strip(),
                  "sector":   str(row["GICS Sector"]).strip(),
                  "industry": str(row["GICS Sub-Industry"]).strip(),
              }
          symbols = list(meta.keys())
          print(f"  {len(symbols)} symbols")

          # ── Download 1 year price history ─────────────────────────
          print("Downloading price history...")
          df = yf.download(
              symbols,
              period="1y",
              auto_adjust=True,
              progress=False,
              threads=True
          )
          close  = df["Close"]
          volume = df["Volume"]

          sma50   = close.rolling(50).mean().iloc[-1]
          sma200  = close.rolling(200).mean().iloc[-1]
          high52  = close.rolling(252).max().iloc[-1]
          last_pr = close.iloc[-1]
          prev_pr = close.iloc[-2]
          avg_vol = volume.rolling(30).mean().iloc[-1]
          print("  Price history done")

          # ── Market cap via fast_info in batches ───────────────────
          print("Fetching market caps...")
          mcaps = {}
          batch_size = 50
          batches = [symbols[i:i+batch_size] for i in range(0, len(symbols), batch_size)]
          for idx, batch in enumerate(batches):
              print(f"  Batch {idx+1}/{len(batches)}...")
              for sym in batch:
                  try:
                      fi = yf.Ticker(sym).fast_info
                      mcaps[sym] = int(fi.market_cap or 0)
                  except:
                      mcaps[sym] = 0

          # ── Build stocks list ─────────────────────────────────────
          print("Building stocks list...")
          stocks = []
          for sym in symbols:
              try:
                  pr   = float(last_pr.get(sym, 0) or 0)
                  prev = float(prev_pr.get(sym, 0) or 0)
                  if pr <= 0:
                      continue
                  ch   = round((pr/prev - 1)*100, 2) if prev > 0 else 0
                  s50  = float(sma50.get(sym,  0) or 0)
                  s200 = float(sma200.get(sym, 0) or 0)
                  ath  = float(high52.get(sym,  0) or 0)
                  vo   = int(avg_vol.get(sym,   0) or 0)
                  mc   = mcaps.get(sym, 0)
                  m    = meta.get(sym, {})
                  stocks.append({
                      "s":    sym,
                      "n":    m.get("name", sym)[:40],
                      "pr":   round(pr, 2),
                      "ch":   ch,
                      "vo":   vo,
                      "mc":   mc,
                      "pe":   0,
                      "se":   m.get("sector", ""),
                      "in":   m.get("industry", ""),
                      "s50":  round(s50, 2),
                      "s200": round(s200, 2),
                      "ath":  round(ath, 2),
                      "ps50":  round((pr/s50  - 1)*100, 2) if s50  > 0 else 0,
                      "ps200": round((pr/s200 - 1)*100, 2) if s200 > 0 else 0,
                      "path":  round((pr/ath  - 1)*100, 2) if ath  > 0 else 0,
                  })
              except Exception as e:
                  print(f"  Skipping {sym}: {e}")

          stocks.sort(key=lambda x: x["mc"], reverse=True)
          print(f"  {len(stocks)} stocks processed")

          with open("stocks.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "stocks": stocks}, f, separators=(",",":"))
          print(f"stocks.json written — {len(stocks)} stocks!")
          PYEOF

      - name: Commit files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json stocks.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update data $(date -u +%Y-%m-%d)" && git push)
