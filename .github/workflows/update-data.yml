            "ZBRA": ["Zebra Technologies","Information Technology","Electronic Equipment & Instruments"],
            "ZTS":  ["Zoetis","Health Care","Pharmaceuticals"],
          }

          symbols = list(SP500_META.keys())
          print(f"Using {len(symbols)} hardcoded S&P 500 symbols with sector/industry")

          # ── Download 1 year price history ─────────────────────────
          print("Downloading price history from Yahoo Finance...")
          df = yf.download(
              symbols,
              period="1y",
              auto_adjust=True,
              progress=False,
              threads=True
          )
          close  = df["Close"]
          volume = df["Volume"]

          sma50   = close.rolling(50).mean().iloc[-1]
          sma200  = close.rolling(200).mean().iloc[-1]
          high52  = close.rolling(252).max().iloc[-1]
          last_pr = close.iloc[-1]
          prev_pr = close.iloc[-2]
          avg_vol = volume.rolling(30).mean().iloc[-1]
          print("  Price history downloaded")

          # ── Market cap via fast_info in batches ───────────────────
          print("Fetching market caps...")
          mcaps = {}
          batch_size = 50
          batches = [symbols[i:i+batch_size] for i in range(0, len(symbols), batch_size)]
          for idx, batch in enumerate(batches):
              print(f"  Batch {idx+1}/{len(batches)}...")
              for sym in batch:
                  try:
                      fi = yf.Ticker(sym).fast_info
                      mcaps[sym] = int(fi.market_cap or 0)
                  except:
                      mcaps[sym] = 0

          # ── Build stocks list ─────────────────────────────────────
          print("Building stocks list...")
          stocks = []
          for sym in symbols:
              try:
                  pr   = float(last_pr.get(sym, 0) or 0)
                  prev = float(prev_pr.get(sym, 0) or 0)
                  if pr <= 0:
                      continue
                  ch   = round((pr/prev - 1)*100, 2) if prev > 0 else 0
                  s50  = float(sma50.get(sym,  0) or 0)
                  s200 = float(sma200.get(sym, 0) or 0)
                  ath  = float(high52.get(sym,  0) or 0)
                  vo   = int(avg_vol.get(sym,   0) or 0)
                  mc   = mcaps.get(sym, 0)
                  m    = SP500_META.get(sym, {})
                  stocks.append({
                      "s":    sym,
                      "n":    m[0] if m else sym,
                      "pr":   round(pr, 2),
                      "ch":   ch,
                      "vo":   vo,
                      "mc":   mc,
                      "pe":   0,
                      "se":   m[1] if m else "",
                      "in":   m[2] if m else "",
                      "s50":  round(s50,  2),
                      "s200": round(s200, 2),
                      "ath":  round(ath,  2),
                      "ps50":  round((pr/s50  - 1)*100, 2) if s50  > 0 else 0,
                      "ps200": round((pr/s200 - 1)*100, 2) if s200 > 0 else 0,
                      "path":  round((pr/ath  - 1)*100, 2) if ath  > 0 else 0,
                  })
              except Exception as e:
                  print(f"  Skipping {sym}: {e}")

          stocks.sort(key=lambda x: x["mc"], reverse=True)
          print(f"  {len(stocks)} stocks processed")

          with open("stocks.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "stocks": stocks}, f, separators=(",",":"))
          print(f"stocks.json written — {len(stocks)} stocks!")
          PYEOF

      - name: Commit files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json stocks.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update data $(date -u +%Y-%m-%d)" && git push)
