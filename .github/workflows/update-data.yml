name: Update financial data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os

          FRED_KEY  = os.environ["FRED_API_KEY"]
          FMP_KEY   = os.environ["FMP_API_KEY"]
          FRED_BASE = "https://api.stlouisfed.org/fred/series/observations"
          FMP_BASE  = "https://financialmodelingprep.com/api/v3"

          def fred(series, start="2000-01-01"):
              url = f"{FRED_BASE}?series_id={series}&api_key={FRED_KEY}&file_type=json&sort_order=asc&observation_start={start}"
              print(f"Fetching FRED {series}...")
              with urllib.request.urlopen(url, timeout=30) as r:
                  payload = json.loads(r.read())
              result = [[o["date"][:7], float(o["value"])]
                        for o in payload["observations"] if o["value"] != "."]
              print(f"  {len(result)} rows")
              return result

          def fmp_get(path):
              url = f"{FMP_BASE}/{path}&apikey={FMP_KEY}"
              print(f"  FMP: {path[:70]}...")
              with urllib.request.urlopen(url, timeout=60) as r:
                  return json.loads(r.read())

          # ── Macro ────────────────────────────────────────────────
          vix = fred("VIXCLS", "2005-01-01")
          yc  = fred("T10Y2Y", "2000-01-01")
          with open("data.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "vix": vix, "yc": yc}, f, separators=(",",":"))
          print("data.json written!")

          # ── S&P 500 symbols (hardcoded — no paid endpoint needed) ─
          SP500 = [
            "A","AAL","AAPL","ABBV","ABNB","ABT","ACGL","ACN","ADBE","ADI","ADM","ADP","ADSK",
            "AEE","AEP","AES","AFL","AIG","AIZ","AJG","AKAM","ALB","ALGN","ALL","ALLE","AMAT",
            "AMCR","AMD","AME","AMGN","AMP","AMT","AMZN","ANET","AON","AOS","APA","APD","APH",
            "APTV","ARE","ATO","AVB","AVGO","AVY","AWK","AXON","AXP","AZO","BA","BAC","BALL",
            "BAX","BBWI","BBY","BDX","BEN","BF.B","BG","BIIB","BIO","BK","BKNG","BKR","BLDR",
            "BLK","BMY","BR","BRK.B","BRO","BSX","BWA","BX","BXP","C","CAG","CAH","CARR","CAT",
            "CB","CBOE","CBRE","CCI","CCL","CDNS","CDW","CE","CEG","CF","CFG","CHD","CHRW","CHTR",
            "CI","CINF","CL","CLX","CMA","CMCSA","CME","CMG","CMI","CMS","CNC","CNP","COF","COO",
            "COP","COR","COST","CPAY","CPB","CPRT","CPT","CRL","CRM","CRWD","CSCO","CSGP","CSX",
            "CTAS","CTLT","CTRA","CTSH","CTVA","CVS","CVX","CZR","D","DAL","DAY","DD","DE","DECK",
            "DELL","DFS","DG","DGX","DHI","DHR","DIS","DLR","DLTR","DOC","DOV","DOW","DPZ","DRI",
            "DTE","DUK","DVA","DVN","DXCM","EA","EBAY","ECL","ED","EFX","EG","EIX","EL","ELV",
            "EMN","EMR","ENPH","EOG","EPAM","EQIX","EQR","EQT","ES","ESS","ETN","ETR","EVRG",
            "EW","EXC","EXPD","EXPE","EXR","F","FANG","FAST","FCX","FDS","FDX","FE","FFIV","FI",
            "FICO","FIS","FITB","FMC","FOX","FOXA","FRT","FSLR","FTNT","FTV","GD","GE","GEHC",
            "GEN","GILD","GIS","GL","GLW","GM","GNRC","GOOGL","GPC","GPN","GRMN","GS","GWW","HAL",
            "HAS","HBAN","HCA","HD","HES","HIG","HII","HLT","HOLX","HON","HPE","HPQ","HRL","HSIC",
            "HST","HSY","HUBB","HUM","HWM","IBM","ICE","IDXX","IEX","IFF","ILMN","INCY","INTC",
            "INTU","INVH","IP","IPG","IQV","IR","IRM","ISRG","IT","ITW","IVZ","J","JBHT","JBL",
            "JCI","JKHY","JNJ","JNPR","JPM","K","KDP","KEY","KEYS","KHC","KIM","KLAC","KMB",
            "KMI","KMX","KO","KR","KVUE","L","LDOS","LEN","LH","LHX","LIN","LKQ","LLY","LMT",
            "LNT","LOW","LRCX","LULU","LUV","LVS","LW","LYB","LYV","MA","MAA","MAR","MAS","MCD",
            "MCHP","MCK","MCO","MDLZ","MDT","MET","META","MGM","MHK","MKC","MKTX","MLM","MMC",
            "MMM","MNST","MO","MOH","MOS","MPC","MPWR","MRK","MRNA","MRO","MS","MSCI","MSFT",
            "MSI","MTB","MTCH","MTD","MU","NCLH","NDAQ","NEE","NEM","NFLX","NI","NKE","NOC",
            "NOW","NRG","NSC","NTAP","NTRS","NUE","NVDA","NVR","NWS","NWSA","NXPI","O","ODFL",
            "OKE","OMC","ON","ORCL","ORLY","OXY","PARA","PAYC","PAYX","PCAR","PCG","PEG","PEP",
            "PFE","PFG","PG","PGR","PH","PHM","PKG","PLD","PM","PNC","PNR","PNW","PODD","POOL",
            "PPG","PPL","PRU","PSA","PSX","PTC","PWR","PXD","PYPL","QCOM","QRVO","RCL","REG",
            "REGN","RF","RJF","RL","RMD","ROK","ROL","ROP","ROST","RPM","RSG","RTX","RVTY","SBAC",
            "SBUX","SCHW","SHW","SJM","SLB","SMCI","SNA","SNPS","SO","SPG","SPGI","SRE","STE",
            "STLD","STT","STX","STZ","SWK","SWKS","SYF","SYK","SYY","T","TAP","TDG","TDY","TECH",
            "TEL","TER","TFC","TFX","TGT","TJX","TMO","TMUS","TPR","TRGP","TRMB","TROW","TRV",
            "TSCO","TSLA","TSN","TT","TTWO","TXN","TXT","TYL","UAL","UBER","UDR","UHS","ULTA",
            "UNH","UNP","UPS","URI","USB","V","VICI","VLO","VLTO","VMC","VRSK","VRSN","VRTX",
            "VST","VTR","VTRS","VZ","WAB","WAT","WBA","WBD","WDAY","WDC","WEC","WELL","WFC",
            "WM","WMB","WMT","WRB","WRK","WST","WTW","WY","WYNN","XEL","XOM","XYL","YUM","ZBH",
            "ZBRA","ZTS"
          ]

          sym_str = ",".join(SP500)
          print(f"Using {len(SP500)} hardcoded S&P 500 symbols")

          print("Fetching quotes...")
          quotes = fmp_get(f"quote/{sym_str}?")
          print(f"  {len(quotes)} quotes")

          print("Fetching profiles...")
          profiles = fmp_get(f"profile/{sym_str}?")
          pmap = {p["symbol"]: p for p in profiles}
          print(f"  {len(pmap)} profiles")

          stocks = []
          for q in quotes:
              sym    = q.get("symbol","")
              p      = pmap.get(sym, {})
              pr     = float(q.get("price") or 0)
              sma50  = float(q.get("priceAvg50")  or 0)
              sma200 = float(q.get("priceAvg200") or 0)
              ath    = float(q.get("yearHigh") or 0)
              stocks.append({
                  "s":    sym,
                  "n":    (q.get("name") or "")[:40],
                  "pr":   round(pr, 2),
                  "ch":   round(float(q.get("changesPercentage") or 0), 2),
                  "vo":   int(q.get("volume") or 0),
                  "mc":   int(q.get("marketCap") or 0),
                  "pe":   round(float(q.get("pe") or 0), 2),
                  "se":   p.get("sector",""),
                  "in":   p.get("industry",""),
                  "s50":  round(sma50, 2),
                  "s200": round(sma200, 2),
                  "ath":  round(ath, 2),
                  "ps50":  round((pr/sma50  - 1)*100, 2) if sma50  > 0 else 0,
                  "ps200": round((pr/sma200 - 1)*100, 2) if sma200 > 0 else 0,
                  "path":  round((pr/ath - 1)*100, 2) if ath > 0 else 0,
              })

          stocks.sort(key=lambda x: x["mc"], reverse=True)

          with open("stocks.json", "w") as f:
              json.dump({"updated": datetime.date.today().isoformat(),
                         "stocks": stocks}, f, separators=(",",":"))
          print(f"stocks.json written — {len(stocks)} stocks!")
          PYEOF

      - name: Commit files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json stocks.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update data $(date -u +%Y-%m-%d)" && git push)
