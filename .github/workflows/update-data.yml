name: Update financial data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data and write data.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os

          KEY  = os.environ["FRED_API_KEY"]
          BASE = "https://api.stlouisfed.org/fred/series/observations"

          def fred(series, start="2000-01-01"):
              url = f"{BASE}?series_id={series}&api_key={KEY}&file_type=json&sort_order=asc&observation_start={start}"
              print(f"Fetching {series}...")
              with urllib.request.urlopen(url, timeout=30) as r:
                  payload = json.loads(r.read())
              result = [[o["date"][:7], float(o["value"])]
                        for o in payload["observations"] if o["value"] != "."]
              print(f"  {len(result)} rows")
              return result

          # --- Shiller CAPE ---
          print("Fetching CAPE...")
          with urllib.request.urlopen(
              "https://posix4e.github.io/shiller_wrapper_data/data/latest.json",
              timeout=30
          ) as r:
              shiller_raw = json.loads(r.read())

          # print top-level keys so we can see the structure
          print("Shiller keys:", list(shiller_raw.keys()))

          # handle both {"data": [...]} and a bare list
          if isinstance(shiller_raw, list):
              rows = shiller_raw
          elif "data" in shiller_raw:
              rows = shiller_raw["data"]
          else:
              # take the first key that holds a list
              rows = next(v for v in shiller_raw.values() if isinstance(v, list))

          cape = []
          for row in rows:
              date_val = row.get("Date") or row.get("date") or ""
              cape_val = row.get("CAPE") or row.get("cape") or row.get("Shiller P/E") or ""
              try:
                  cape.append([str(date_val)[:7], float(cape_val)])
              except (ValueError, TypeError):
                  pass

          print(f"  {len(cape)} CAPE rows")

          # --- FRED series ---
          vix = fred("VIXCLS",          "2005-01-01")
          yc  = fred("T10Y2Y",          "2000-01-01")
          mkt = fred("DDDM01USA156NWDB","1995-01-01")
          gdp = fred("GDP",             "1995-01-01")

          gdp_map = {r[0][:4]: r[1] for r in gdp}
          buffett = [
              [r[0], round(r[1] / gdp_map[r[0][:4]] * 100, 1)]
              for r in mkt if r[0][:4] in gdp_map
          ]
          print(f"  {len(buffett)} Buffett rows")

          out = {
              "updated": datetime.date.today().isoformat(),
              "cape":    cape[-400:],
              "vix":     vix,
              "yc":      yc,
              "buffett": buffett,
          }

          with open("data.json", "w") as f:
              json.dump(out, f, separators=(",", ":"))

          print("data.json written successfully!")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: update financial data $(date -u +%Y-%m-%d)" && git push)
